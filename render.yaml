# Deploy from REPOSITORY ROOT (Root Directory in Render = empty).
# build/start call the root package.json scripts, which cd into stripe-backend.
# Set STRIPE_SECRET_KEY in Render Environment.

services:
  - type: web
    name: clipflow-stripe-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
# Add STRIPE_SECRET_KEY only in the Render dashboard (Secrets) — do not put it in this file.
