# Backend Web Service: run from the stripe-backend folder (Node API).
# In the Render Dashboard: Settings → Build & Deploy → Root Directory = stripe-backend
# (Blueprint uses rootDir below so deploys match.)
# Set STRIPE_SECRET_KEY (and other env vars) in the service Environment tab — never commit secrets.

services:
  - type: web
    name: clipflow-stripe-api
    rootDir: stripe-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
# Add STRIPE_SECRET_KEY only in the Render dashboard (Secrets) — do not put it in this file.
