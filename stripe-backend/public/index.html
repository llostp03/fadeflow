<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipFlow — Sign up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0f;
      color: #fff;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: linear-gradient(180deg, #16161d, #0f0f14);
      border: 1px solid #222;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    .logo { font-size: 1.75rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 12px; }
    .logo span { color: #d4af37; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #bdbdbd; font-size: 1rem; margin-bottom: 24px; }
    .actions { display: flex; flex-direction: column; gap: 12px; }
    a.btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    a.btn:hover { opacity: 0.92; }
    .btn-primary { background: #d4af37; color: #111; }
    .btn-secondary {
      border: 1px solid #333;
      background: #14141a;
      color: #fff;
    }
    .back { margin-top: 28px; font-size: 0.9rem; }
    .back a { color: #d4af37; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Clip<span>Flow</span></div>
    <h1>Get started</h1>
    <p>
      Booking and payments run in the ClipFlow mobile app. For questions or to request a time by email,
      reach out — we’ll point you to the app or next steps.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="mailto:llostp03@icloud.com?subject=ClipFlow%20signup">Email us</a>
      <a class="btn btn-secondary" href="/">Back to home</a>
    </div>
    <p class="back"><a href="/">← clipflow.com home</a></p>
  </div>
</body>
</html>
